<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRAIN-STORM</title>
    <style>
        :root {
            --bg-void: #000000; 
            --card-bg: rgba(13, 17, 23, 0.95);
            --cyan: #00f2ff;
            --cyan-dim: rgba(0, 242, 255, 0.1);
            --cyan-glow: rgba(0, 242, 255, 0.6);
            --text: #e6edf3;
            --danger: #ff4d4d;
            --success: #00ff88;
            --platform: #161b22;
            --platform-border: #30363d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; user-select: none; }
        body { background: var(--bg-void); color: var(--text); overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }

        #canvas-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #bgCanvas { z-index: 1; }
        #gameCanvas { z-index: 2; }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; justify-content: center; align-items: center; z-index: 100; }
        
        .screen { pointer-events: auto; display: none; flex-direction: column; gap: 15px; background: var(--card-bg); border: 1px solid var(--platform-border); border-radius: 16px; padding: 40px; box-shadow: 0 10px 50px rgba(0,0,0,0.9); width: 90%; max-width: 500px; backdrop-filter: blur(8px); }
        .screen.active { display: flex; animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }

        @keyframes slideIn {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 { color: var(--cyan); text-align: center; letter-spacing: 4px; text-shadow: 0 0 15px var(--cyan-glow); font-size: 2.5rem; margin-bottom: 5px; }
        input { width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--platform-border); border-radius: 8px; color: white; font-size: 1.1rem; outline: none; text-align: center; }
        
        .btn { background: var(--cyan); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 1rem; width: 100%; letter-spacing: 1px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px var(--cyan-glow); }
        .btn-secondary { background: transparent; border: 2px solid var(--platform-border); color: var(--text); padding: 12px; }

        /* QR SCAN OPTIMIZATION */
        #qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 200; justify-content: center; align-items: center; flex-direction: column; gap: 30px; pointer-events: auto;}
        #qr-modal.active { display: flex; }
        
        .qr-frame { background: #ffffff; padding: 20px; border-radius: 12px; box-shadow: 0 0 40px rgba(255,255,255,0.3); transition: 0.3s; }
        
        /* Ensures pixel clarity for scanners */
        .qr-frame img { 
            display: block; 
            width: 280px; 
            height: 280px; 
            image-rendering: pixelated; 
        }

        @media (min-width: 1024px) {
            .qr-frame img { width: 550px; height: 550px; }
            .qr-frame { padding: 35px; }
        }

        #hud { position: absolute; top: 20px; left: 20px; right: 20px; display: none; justify-content: space-between; font-weight: bold; z-index: 10; pointer-events: none; }
        #hud span { background: var(--card-bg); padding: 10px 20px; border-radius: 8px; border: 1px solid var(--platform-border); }

        .fs-toggle { position: fixed; bottom: 20px; right: 20px; z-index: 300; background: rgba(0,0,0,0.5); border: 1px solid var(--cyan); color: var(--cyan); padding: 10px; border-radius: 8px; cursor: pointer; pointer-events: auto; }

        .opt-btn { background: rgba(33, 38, 45, 0.7); border: 2px solid var(--platform-border); color: white; padding: 18px; border-radius: 8px; text-align: left; cursor: pointer; transition: 0.3s; width: 100%; margin-bottom: 8px; }
        .opt-btn:hover { border-color: var(--cyan); background: var(--cyan-dim); }

        #mobile-controls { position: absolute; bottom: 30px; left: 20px; right: 20px; display: none; justify-content: space-between; z-index: 50; pointer-events: none; }
        .ctrl-btn { width: 70px; height: 70px; background: rgba(0,242,255,0.05); border: 2px solid var(--cyan); border-radius: 50%; color: var(--cyan); display: flex; justify-content: center; align-items: center; pointer-events: auto; font-size: 1.8rem; }
        @media (max-width: 1024px) { #mobile-controls { display: flex; } }
    </style>
</head>
<body>

<button class="fs-toggle" onclick="toggleFS()">⛶ FULLSCREEN</button>

<div id="canvas-container">
    <canvas id="bgCanvas"></canvas>
    <canvas id="gameCanvas"></canvas>
</div>

<div id="hud">
    <span>USER: <span id="hud-user" style="color:var(--cyan)"></span></span>
    <span>LIVES: <span id="hud-lives" style="color:var(--danger)">3</span></span>
    <span>SECTOR: <span id="hud-level" style="color:var(--cyan)">1</span></span>
</div>

<div id="ui-layer">
    <div id="menu-screen" class="screen active">
        <h1>BRAIN-STORM</h1>
        <p id="hs-text" style="text-align: center; color: #8b949e; font-weight: bold;"></p>
        <input type="text" id="username" placeholder="Enter Alias..." maxlength="12">
        <button class="btn" onclick="startGame()">Initialize Mission</button>
        <button class="btn btn-secondary" onclick="showScreen('how-to')" style="margin-top:10px">How to Play</button>
        <button class="btn btn-secondary" onclick="showScreen('credits')">Credits</button>
        <button class="btn btn-secondary" onclick="toggleQR(true)">Share System (QR)</button>
    </div>

    <div id="how-to" class="screen">
        <h2>MISSION GUIDE</h2>
        <p>• Move: <span style="color:var(--cyan)">Arrows / WASD</span></p>
        <p>• Jump: <span style="color:var(--cyan)">Up / Space</span></p>
        <p>• <span style="color:var(--success)">Flux Beacons</span>: SPINNING pyramids are safe zones.</p>
        <button class="btn" onclick="showScreen('menu-screen')">Back</button>
    </div>

    <div id="credits" class="screen">
        <h2>CREDITS</h2>
        <div style="text-align: center;">
            <p style="color:#8b949e">Lead Developer</p>
            <p style="font-size: 1.5rem; font-weight: bold; color: var(--cyan); margin: 10px 0;">Muhammad Rehan Shaukat</p>
            <p>Lecturer in UTAS</p>
            <button class="btn btn-secondary" onclick="showScreen('menu-screen')" style="margin-top:20px">Back</button>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <h2 style="color: var(--cyan); text-align: center;">TERMINAL ACCESS</h2>
        <p id="q-text" style="text-align: center; margin: 15px 0; font-size: 1.3rem; border-left: 4px solid var(--cyan); padding-left: 10px;"></p>
        <div id="opt-box"></div>
    </div>
</div>

<div id="qr-modal">
    <div class="qr-frame">
        <img src="https://storage3.me-qr.com/qr/343222737.png?v=1777820178" alt="Scan to Play">
    </div>
    <p style="color: var(--cyan); font-weight: bold;">SCAN TO PLAY</p>
    <button class="btn" style="max-width: 200px;" onclick="toggleQR(false)">Back</button>
</div>

<div id="mobile-controls">
    <div style="display:flex; gap:15px;"><div class="ctrl-btn" id="btn-left">←</div><div class="ctrl-btn" id="btn-right">→</div></div>
    <div class="ctrl-btn" id="btn-up">↑</div>
</div>

<script>
    const AU = new (window.AudioContext || window.webkitAudioContext)();
    function sfx(f, t, type='square', v=0.1) {
        const osc = AU.createOscillator(); const gain = AU.createGain();
        osc.type = type; osc.frequency.setValueAtTime(f, AU.currentTime);
        gain.gain.setValueAtTime(v, AU.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, AU.currentTime + t);
        osc.connect(gain); gain.connect(AU.destination); osc.start(); osc.stop(AU.currentTime + t);
    }

    const questions = [
        { q: "What is the Latin root of the word Market?", o: ["Mercato", "Tradeus", "Mercatus", "Marketus"], a: 2 },
        { q: "STP stands for:", o: ["Strategy, Tactics, Planning", "Selling, Trading, Pricing", "Segmentation, Targeting, Positioning", "Standards"], a: 2 },
        { q: "Volvo's 'Safety' focus is an example of:", o: ["Targeting", "Positioning", "Pricing", "Production"], a: 1 }
    ];

    const gCanvas = document.getElementById('gameCanvas');
    const bCanvas = document.getElementById('bgCanvas');
    const gctx = gCanvas.getContext('2d');
    const bctx = bCanvas.getContext('2d');

    let state = 'MENU', lives = 3, sector = 1, cameraX = 0, username = "", checkpointRotation = 0;
    let loopID;
    let best = localStorage.getItem('bs_best') || 1;
    document.getElementById('hs-text').innerText = `BEST: SECTOR ${best}`;

    const player = { x: 100, y: 0, w: 32, h: 32, dx: 0, dy: 0, speed: 7.5, gravity: 0.65, jPower: -13, grounded: false, canDJ: true, trail: [], lastFace: 1 };
    let platforms = [], spikes = [], checkpoints = [], goal = { x: 0, y: 0 };
    let lastCheck = { x: 100, y: 0 };
    const keys = { left: false, right: false };

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else if (document.exitFullscreen) document.exitFullscreen();
    }

    function resize() { gCanvas.width = bCanvas.width = window.innerWidth; gCanvas.height = bCanvas.height = window.innerHeight; drawStars(); }
    window.onresize = resize; resize();

    window.onkeydown = e => { 
        if(e.code==='ArrowLeft'||e.code==='KeyA') { keys.left=true; player.lastFace = -1; }
        if(e.code==='ArrowRight'||e.code==='KeyD') { keys.right=true; player.lastFace = 1; }
        if(e.code==='ArrowUp'||e.code==='KeyW'||e.code==='Space') jump(); 
    };
    window.onkeyup = e => { if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=false; if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=false; };
    
    function jump() {
        if(player.grounded) { player.dy = player.jPower; player.grounded = false; player.canDJ = true; sfx(400, 0.1); }
        else if(player.canDJ) { player.dy = player.jPower * 0.85; player.canDJ = false; sfx(600, 0.1); }
    }

    const mb = (id, k) => { 
        const el = document.getElementById(id); 
        el.onpointerdown = e => { e.preventDefault(); if(k==='up') jump(); else { keys[k]=true; player.lastFace = (k==='left'?-1:1); }};
        el.onpointerup = e => { e.preventDefault(); if(k!=='up') keys[k]=false; };
    };
    mb('btn-left', 'left'); mb('btn-right', 'right'); mb('btn-up', 'up');

    function drawStars() {
        bctx.fillStyle = '#000'; bctx.fillRect(0,0,bCanvas.width, bCanvas.height);
        for(let i=0; i<200; i++) {
            bctx.fillStyle = `rgba(255,255,255,${Math.random()})`;
            bctx.beginPath(); bctx.arc(Math.random()*bCanvas.width, Math.random()*bCanvas.height, Math.random()*1.5, 0, Math.PI*2); bctx.fill();
        }
    }

    function generateLevel() {
        spikes = []; checkpoints = [];
        platforms = [{ x: 0, y: gCanvas.height-120, w: 600, h: 120 }];
        let curX = 600;
        for(let i=0; i<35; i++) {
            let gap = 160 + Math.random()*100;
            let width = 180 + Math.random()*200;
            let y = (gCanvas.height-160) - (Math.random()*250);
            if(y < 150) y = 150;
            const plat = { x: curX+gap, y: y, w: width, h: 40 };
            platforms.push(plat);
            if(i % 6 === 0 && i !== 0) checkpoints.push({ x: plat.x + plat.w/2, y: plat.y - 50, active: false });
            else if(Math.random() < 0.6 && i > 1) {
                spikes.push({ x: plat.x + (plat.w/2) - 13, y: plat.y - 22, w: 26, h: 22 });
            }
            curX += gap + width;
        }
        goal = { x: curX + 200, y: gCanvas.height-120 };
        player.x = lastCheck.x; player.y = lastCheck.y;
    }

    function loop() {
        if(state !== 'PLAYING') return;
        checkpointRotation += 0.05;
        if(keys.left) player.dx = -player.speed; else if(keys.right) player.dx = player.speed; else player.dx *= 0.82;
        player.dy += player.gravity; player.x += player.dx; player.y += player.dy;
        player.trail.push({x: player.x, y: player.y}); if(player.trail.length > 12) player.trail.shift();
        player.grounded = false;
        platforms.forEach(p => {
            if(player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y + player.h < p.y + p.h + 15) {
                if(player.dy > 0) { player.y = p.y - player.h; player.dy = 0; player.grounded = true; player.canDJ = true; }
            }
        });
        checkpoints.forEach(c => {
            let dist = Math.hypot(player.x + 16 - c.x, player.y + 16 - c.y);
            if(!c.active && dist < 40) { c.active = true; lastCheck = { x: c.x - 16, y: c.y - 16 }; sfx(900, 0.3, 'sine'); }
        });
        spikes.forEach(s => { if(player.x < s.x + s.w - 5 && player.x + player.w > s.x + 5 && player.y < s.y + s.h && player.y + player.h > s.y + 5) handleHit(); });
        if(player.y > gCanvas.height + 200) handleHit();
        if(player.x > goal.x) triggerQuiz();
        cameraX += ((player.x - gCanvas.width/3) - cameraX) * 0.1;
        if(cameraX < 0) cameraX = 0;
        render();
        loopID = requestAnimationFrame(loop);
    }

    function render() {
        gctx.clearRect(0,0, gCanvas.width, gCanvas.height);
        gctx.save(); gctx.translate(-cameraX, 0);
        platforms.forEach(p => { gctx.fillStyle = '#161b22'; gctx.fillRect(p.x, p.y, p.w, p.h); gctx.strokeStyle = '#30363d'; gctx.strokeRect(p.x, p.y, p.w, p.h); });
        checkpoints.forEach(c => {
            gctx.save(); gctx.translate(c.x, c.y); gctx.rotate(checkpointRotation);
            gctx.shadowBlur = 20; gctx.shadowColor = c.active ? '#00ff88' : '#333';
            gctx.strokeStyle = c.active ? '#00ff88' : '#666'; gctx.lineWidth = 3;
            gctx.beginPath(); gctx.moveTo(0, -20); gctx.lineTo(15, 10); gctx.lineTo(-15, 10); gctx.closePath(); gctx.stroke();
            if(c.active) { gctx.fillStyle = 'rgba(0,255,136,0.3)'; gctx.fill(); }
            gctx.restore();
        });
        spikes.forEach(s => { gctx.fillStyle = '#ff4d4d'; gctx.beginPath(); gctx.moveTo(s.x, s.y+s.h); gctx.lineTo(s.x+s.w/2, s.y); gctx.lineTo(s.x+s.w, s.y+s.h); gctx.fill(); });
        gctx.fillStyle = '#00f2ff'; gctx.fillRect(goal.x, goal.y-150, 5, 150);
        player.trail.forEach((t, i) => { gctx.globalAlpha = i/15; gctx.fillStyle = '#00f2ff'; gctx.fillRect(t.x, t.y, player.w, player.h); });
        gctx.globalAlpha = 1; gctx.fillStyle = '#00f2ff'; gctx.shadowBlur = 15; gctx.shadowColor = '#00f2ff';
        gctx.fillRect(player.x, player.y, player.w, player.h);
        gctx.fillStyle = '#000'; gctx.fillRect(player.lastFace === 1 ? player.x + 18 : player.x + 4, player.y + 8, 10, 10);
        gctx.restore();
    }

    function handleHit() {
        sfx(80, 0.3, 'sawtooth');
        lives--; updateHUD();
        if(lives <= 0) { lives = 3; lastCheck = { x: 100, y: gCanvas.height-250 }; generateLevel(); updateHUD(); }
        else { player.x = lastCheck.x; player.y = lastCheck.y; player.dx = player.dy = 0; }
    }

    function startGame() {
        cancelAnimationFrame(loopID);
        AU.resume();
        username = document.getElementById('username').value.trim() || "REHAN";
        lives = 3; sector = 1; lastCheck = { x: 100, y: gCanvas.height-250 };
        showScreen(null); document.getElementById('hud').style.display = 'flex';
        state = 'PLAYING'; generateLevel(); updateHUD(); loop();
    }

    function triggerQuiz() {
        cancelAnimationFrame(loopID);
        state = 'QUIZ'; showScreen('quiz-screen');
        const q = questions[Math.floor(Math.random()*questions.length)];
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('opt-box'); box.innerHTML = '';
        q.o.forEach((opt, i) => {
            const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = opt;
            b.onclick = () => {
                if(i === q.a) { 
                    sfx(1200, 0.3); lives = Math.min(3, lives + 1);
                    setTimeout(() => { sector++; if(sector > best) { best = sector; localStorage.setItem('bs_best', best); } showScreen(null); state = 'PLAYING'; generateLevel(); updateHUD(); loop(); }, 1000); 
                } else { 
                    sfx(50, 0.5, 'sawtooth');
                    setTimeout(() => { sector = 1; lives = 3; startGame(); }, 1500); 
                }
            };
            box.appendChild(b);
        });
    }

    function updateHUD() { document.getElementById('hud-user').innerText = username; document.getElementById('hud-level').innerText = sector; document.getElementById('hud-lives').innerText = lives; }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); if(id) document.getElementById(id).classList.add('active'); document.getElementById('ui-layer').style.pointerEvents = id ? 'auto' : 'none'; }
    function toggleQR(s) { document.getElementById('qr-modal').classList.toggle('active', s); }
</script>
</body>
</html>
