<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRAIN-STORM</title>
    <style>
        :root {
            --bg-void: #000000; 
            --card-bg: rgba(13, 17, 23, 0.98);
            --cyan: #00f2ff;
            --cyan-dim: rgba(0, 242, 255, 0.1);
            --cyan-glow: rgba(0, 242, 255, 0.6);
            --text: #e6edf3;
            --danger: #ff4d4d;
            --success: #00ff88;
            --platform: #161b22;
            --platform-border: #30363d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; user-select: none; }
        body { background: var(--bg-void); color: var(--text); overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; position: fixed; width: 100%; }

        #canvas-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: #000; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        #bgCanvas { z-index: 1; }
        #gameCanvas { z-index: 2; }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; justify-content: center; align-items: center; z-index: 100; }
        
        .screen { pointer-events: auto; display: none; flex-direction: column; gap: 10px; background: var(--card-bg); border: 1px solid var(--platform-border); border-radius: 12px; padding: 20px; box-shadow: 0 10px 50px rgba(0,0,0,0.9); width: 85%; max-width: 400px; backdrop-filter: blur(10px); }
        .screen.active { display: flex; animation: slideIn 0.3s ease-out; }

        @keyframes slideIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        h1 { color: var(--cyan); text-align: center; letter-spacing: 2px; text-shadow: 0 0 10px var(--cyan-glow); font-size: 1.8rem; }
        input { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--platform-border); border-radius: 8px; color: white; font-size: 1rem; outline: none; text-align: center; }
        
        .btn { background: var(--cyan); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; width: 100%; }
        .btn-secondary { background: transparent; border: 1px solid var(--platform-border); color: var(--text); padding: 10px; font-size: 0.8rem; }

        #qr-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200; justify-content: center; align-items: center; flex-direction: column; gap: 20px; pointer-events: auto;}
        #qr-modal.active { display: flex; }
        .qr-frame { background: #fff; padding: 10px; border-radius: 8px; }
        .qr-frame img { display: block; width: 70vw; height: 70vw; max-width: 400px; max-height: 400px; image-rendering: pixelated; }

        #hud { position: absolute; top: 10px; left: 10px; right: 10px; display: none; justify-content: space-between; font-size: 0.7rem; z-index: 10; pointer-events: none; }
        #hud span { background: var(--card-bg); padding: 6px 12px; border-radius: 6px; border: 1px solid var(--platform-border); }

        .opt-btn { background: rgba(33, 38, 45, 0.7); border: 1px solid var(--platform-border); color: white; padding: 12px; border-radius: 6px; text-align: left; font-size: 0.9rem; margin-bottom: 5px; width: 100%; }

        #mobile-controls { position: absolute; bottom: 20px; left: 15px; right: 15px; display: flex; justify-content: space-between; z-index: 50; pointer-events: none; }
        .ctrl-btn { width: 65px; height: 65px; background: rgba(0,242,255,0.1); border: 2px solid var(--cyan); border-radius: 50%; color: var(--cyan); display: flex; justify-content: center; align-items: center; pointer-events: auto; font-size: 1.5rem; font-weight: bold; touch-action: none; }
        
        @media (min-width: 1024px) { #mobile-controls { display: none; } }
    </style>
</head>
<body>

<div id="canvas-container">
    <canvas id="bgCanvas"></canvas>
    <canvas id="gameCanvas"></canvas>
</div>

<div id="hud">
    <span>USER: <span id="hud-user" style="color:var(--cyan)"></span></span>
    <span>LIVES: <span id="hud-lives" style="color:var(--danger)">3</span></span>
    <span>SECTOR: <span id="hud-level" style="color:var(--cyan)">1</span></span>
</div>

<div id="ui-layer">
    <div id="menu-screen" class="screen active">
        <h1>BRAIN-STORM</h1>
        <p id="hs-text" style="text-align: center; color: #8b949e; font-size: 0.8rem;"></p>
        <input type="text" id="username" placeholder="Alias..." maxlength="12">
        <button class="btn" onclick="startGame()">Initialize Mission</button>
        <button class="btn btn-secondary" onclick="showScreen('how-to')">How to Play</button>
        <button class="btn btn-secondary" onclick="showScreen('credits')">Credits</button>
        <button class="btn btn-secondary" onclick="toggleQR(true)">Share System (QR)</button>
    </div>

    <div id="how-to" class="screen">
        <h2>GUIDE</h2>
        <p>• Move: Arrows / WASD</p>
        <p>• Jump: Up / Space / Button</p>
        <button class="btn" onclick="showScreen('menu-screen')">Back</button>
    </div>

    <div id="credits" class="screen">
        <h2>CREDITS</h2>
        <p style="font-size: 1.1rem; color: var(--cyan);">Muhammad Rehan Shaukat</p>
        <p>Lecturer in UTAS</p>
        <button class="btn btn-secondary" onclick="showScreen('menu-screen')">Back</button>
    </div>

    <div id="quiz-screen" class="screen">
        <h2 style="color: var(--cyan); text-align: center; font-size: 1.2rem;">TERMINAL ACCESS</h2>
        <p id="q-text" style="margin: 10px 0; font-size: 1rem;"></p>
        <div id="opt-box"></div>
    </div>
</div>

<div id="qr-modal">
    <div class="qr-frame">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=600x600&ecc=H&margin=1&data=https%3A%2F%2Fibrahimrehan2020-rgb.github.io%2FInnovativeLearningGame%2F" alt="Scan QR">
    </div>
    <p style="color: var(--cyan); font-weight: bold;">SCAN TO CONNECT</p>
    <button class="btn" style="max-width: 150px;" onclick="toggleQR(false)">Back</button>
</div>

<div id="mobile-controls">
    <div style="display:flex; gap:15px;"><div class="ctrl-btn" id="btn-left">←</div><div class="ctrl-btn" id="btn-right">→</div></div>
    <div class="ctrl-btn" id="btn-up">↑</div>
</div>

<script>
    const AU = new (window.AudioContext || window.webkitAudioContext)();
    function sfx(f, t, type='square', v=0.1) {
        try {
            const osc = AU.createOscillator(); const gain = AU.createGain();
            osc.type = type; osc.frequency.setValueAtTime(f, AU.currentTime);
            gain.gain.setValueAtTime(v, AU.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, AU.currentTime + t);
            osc.connect(gain); gain.connect(AU.destination); osc.start(); osc.stop(AU.currentTime + t);
        } catch(e){}
    }

    const questions = [
        // CHAPTER 1
        { q: "What is the Latin root of the word 'Market'?", o: ["Mercato", "Tradeus", "Mercatus", "Marketus"], a: 2 },
        { q: "A market consists of all potential customers sharing a particular:", o: ["Address", "Need or Want", "Bank Account", "Nationality"], a: 1 },
        { q: "In a 'Buyer's Market', who holds the power?", o: ["Sellers", "Governments", "Buyers", "Manufacturers"], a: 2 },
        { q: "The 'Exchange' process requires at least how many parties?", o: ["One", "Two", "Three", "Five"], a: 1 },
        { q: "Which is a 'Place' market example?", o: ["Stock Market", "eBay", "Regional Trade Fair", "Digital Currency"], a: 2 },
        { q: "Marketing is a social process by which individuals obtain what they need through:", o: ["Theft", "Creating/Exchanging value", "Force", "Saving"], a: 1 },
        // CHAPTER 2
        { q: "What is the primary goal of the 'Marketing Concept'?", o: ["Maximize Sales", "Customer Satisfaction", "Mass Production", "Product Variety"], a: 1 },
        { q: "The 'Production Concept' focuses on:", o: ["Quality", "Customer Service", "Affordability and Availability", "Heavy Advertising"], a: 2 },
        { q: "The 'Societal Marketing Concept' balances profits, consumer wants, and:", o: ["Shareholder interests", "Society's well-being", "Competitor prices", "Labor unions"], a: 1 },
        { q: "Which concept assumes consumers will favor products with the most quality?", o: ["Selling Concept", "Product Concept", "Marketing Concept", "Global Concept"], a: 1 },
        { q: "The 'Selling Concept' is typically practiced with what kind of goods?", o: ["Daily Groceries", "Unsought Goods", "Luxury Cars", "High-tech Gadgets"], a: 1 },
        { q: "What is the first step in the Marketing Process?", o: ["Capture Value", "Build Relationships", "Understand the Marketplace", "Design Strategy"], a: 2 },
        // CHAPTER 3
        { q: "What does the 'S' in STP stand for?", o: ["Sales", "Systems", "Segmentation", "Sustainability"], a: 2 },
        { q: "Which is a 'Demographic' segmentation variable?", o: ["Personality", "Lifestyle", "Age", "Climate"], a: 2 },
        { q: "Psychographic segmentation is based on:", o: ["Country", "Income", "Social Class/Lifestyle", "Usage Rate"], a: 2 },
        { q: "What is 'Positioning'?", o: ["Moving goods to stores", "The place a product occupies in minds", "Geographic location", "Setting the price"], a: 1 },
        { q: "Targeting involves evaluating each segment's:", o: ["History", "Attractiveness", "Name", "Legal status"], a: 1 },
        { q: "Volvo is positioned on 'Safety'. This is an example of:", o: ["Price positioning", "Benefit positioning", "User positioning", "Competitor positioning"], a: 1 },
        // CHAPTER 4
        { q: "The 'Marketing Mix' is also known as the:", o: ["4 Ps", "4 Cs", "4 Os", "4 Rs"], a: 0 },
        { q: "Which 'P' refers to the communication tools used by a company?", o: ["Product", "Price", "Place", "Promotion"], a: 3 },
        { q: "What is the 'Product' in marketing?", o: ["Only physical objects", "Anything offered to a market for attention/use", "Just the brand name", "The warehouse stock"], a: 1 },
        { q: "Discounts and Credit Terms fall under which 'P'?", o: ["Product", "Promotion", "Price", "Place"], a: 2 },
        { q: "Logistics and Inventory management are parts of:", o: ["Promotion", "Product", "Place", "Personnel"], a: 2 },
        { q: "Public Relations is a sub-element of:", o: ["Price", "Place", "Promotion", "Product"], a: 2 },
        // CHAPTER 5
        { q: "What is the Microenvironment?", o: ["Factors close to the company", "Large societal forces", "Global economic trends", "International laws"], a: 0 },
        { q: "Which is a 'Macroenvironment' factor?", o: ["Suppliers", "Competitors", "Technological forces", "Customers"], a: 2 },
        { q: "The 'Publics' in the microenvironment include:", o: ["Financial and Media publics", "The Climate", "Political parties", "Only the CEO"], a: 0 },
        { q: "Demography is the study of:", o: ["Rocks", "Human populations", "Animal behavior", "Computer code"], a: 1 },
        { q: "The 'Economic Environment' affects consumer:", o: ["Religion", "Purchasing power", "Education", "Height"], a: 1 },
        { q: "Legislation affecting business is part of the:", o: ["Natural environment", "Political environment", "Cultural environment", "Technological environment"], a: 1 },
        // CHAPTER 6
        { q: "Consumer Buyer Behavior refers to the buying behavior of:", o: ["Businesses", "Final consumers", "Wholesalers", "Governments"], a: 1 },
        { q: "What is the first stage of the Buyer Decision Process?", o: ["Information Search", "Need Recognition", "Purchase Decision", "Evaluation"], a: 1 },
        { q: "Cognitive Dissonance occurs in which stage?", o: ["Information Search", "Post-purchase Behavior", "Evaluation", "Need Recognition"], a: 1 },
        { q: "A 'Reference Group' is a:", o: ["Social factor", "Personal factor", "Psychological factor", "Cultural factor"], a: 0 },
        { q: "What is 'Maslow's' highest level of need?", o: ["Social", "Safety", "Self-actualization", "Esteem"], a: 2 },
        { q: "The set of basic values learned from family/institutions is:", o: ["Subculture", "Culture", "Social Class", "Perception"], a: 1 },
        // CHAPTER 7
        { q: "Business Buyer Behavior involves buying for:", o: ["Personal use", "Further processing or resale", "Gifts", "Hobbies"], a: 1 },
        { q: "In a 'Straight Rebuy', the buyer:", o: ["Modifies specs", "Reorders without modification", "Searches for new suppliers", "Buys for the first time"], a: 1 },
        { q: "The 'Buying Center' is:", o: ["A physical building", "The decision-making unit of an organization", "A retail mall", "A logistics hub"], a: 1 },
        { q: "Which is a major influence on business buyers?", o: ["Individual factors", "Organizational factors", "Environmental factors", "All of the above"], a: 3 },
        { q: "What is 'E-procurement'?", o: ["Buying from a physical store", "Online purchasing", "Manual paper bidding", "Face-to-face negotiation"], a: 1 },
        { q: "The 'New Task' buying situation is:", o: ["Routine", "Complex and requires research", "Fast and easy", "Automatic"], a: 1 },
        // CHAPTER 8
        { q: "Competitive Advantage is gained by offering consumers:", o: ["Higher prices", "Greater value", "Less information", "Fewer features"], a: 1 },
        { q: "A 'Competitor Map' helps identify:", o: ["Employee names", "Direct and indirect competitors", "Stock prices", "Factory locations"], a: 1 },
        { q: "What is 'Benchmarking'?", o: ["Setting a stool height", "Comparing products against leaders", "Firing staff", "Changing the logo"], a: 1 },
        { q: "A 'Market Leader' has the:", o: ["Lowest sales", "Largest market share", "Fewest employees", "Smallest budget"], a: 1 },
        { q: "Niche marketing focuses on:", o: ["The whole market", "Small, specific segments", "International trade only", "Mass production"], a: 1 },
        { q: "Michael Porter’s three basic strategies include 'Cost Leadership', 'Differentiation', and:", o: ["Pricing", "Focus", "Advertising", "Distribution"], a: 1 },
        { q: "A company that follows the leader's moves is a:", o: ["Market Follower", "Market Challenger", "Market Nicher", "Market Boss"], a: 0 },
        { q: "The 'Blue Ocean Strategy' aims to:", o: ["Fight in crowded markets", "Create uncontested market space", "Increase taxes", "Stop exports"], a: 1 }
    ];

    const gCanvas = document.getElementById('gameCanvas');
    const bCanvas = document.getElementById('bgCanvas');
    const gctx = gCanvas.getContext('2d');
    const bctx = bCanvas.getContext('2d');

    let state = 'MENU', lives = 3, sector = 1, cameraX = 0, username = "", checkpointRotation = 0;
    let loopID;
    let best = localStorage.getItem('bs_best') || 1;
    document.getElementById('hs-text').innerText = `RECORD: SECTOR ${best}`;

    const player = { x: 100, y: 0, w: 28, h: 28, dx: 0, dy: 0, speed: 6.5, gravity: 0.6, jPower: -12, grounded: false, canDJ: true, trail: [], lastFace: 1 };
    let platforms = [], spikes = [], checkpoints = [], goal = { x: 0, y: 0 }, lastCheck = { x: 100, y: 0 };
    const keys = { left: false, right: false };

    function requestFS() {
        const doc = document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
        else if (doc.msRequestFullscreen) doc.msRequestFullscreen();
    }

    function resize() { 
        gCanvas.width = bCanvas.width = window.innerWidth; 
        gCanvas.height = bCanvas.height = window.innerHeight; 
        drawStars(); 
    }
    window.onresize = resize; resize();

    window.onkeydown = e => { 
        if(e.code==='ArrowLeft'||e.code==='KeyA') { keys.left=true; player.lastFace = -1; }
        if(e.code==='ArrowRight'||e.code==='KeyD') { keys.right=true; player.lastFace = 1; }
        if(e.code==='ArrowUp'||e.code==='KeyW'||e.code==='Space') jump(); 
    };
    window.onkeyup = e => { if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=false; if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=false; };
    
    function jump() {
        if(player.grounded) { player.dy = player.jPower; player.grounded = false; player.canDJ = true; sfx(400, 0.1); }
        else if(player.canDJ) { player.dy = player.jPower * 0.85; player.canDJ = false; sfx(600, 0.1); }
    }

    const mb = (id, k) => { 
        const el = document.getElementById(id); 
        el.addEventListener('touchstart', e => { e.preventDefault(); if(k==='up') jump(); else { keys[k]=true; player.lastFace = (k==='left'?-1:1); }}, {passive: false});
        el.addEventListener('touchend', e => { e.preventDefault(); if(k!=='up') keys[k]=false; }, {passive: false});
    };
    mb('btn-left', 'left'); mb('btn-right', 'right'); mb('btn-up', 'up');

    function drawStars() {
        bctx.fillStyle = '#000'; bctx.fillRect(0,0,bCanvas.width, bCanvas.height);
        for(let i=0; i<100; i++) {
            bctx.fillStyle = `rgba(255,255,255,${Math.random()})`;
            bctx.beginPath(); bctx.arc(Math.random()*bCanvas.width, Math.random()*bCanvas.height, Math.random()*1.2, 0, Math.PI*2); bctx.fill();
        }
    }

    function generateLevel() {
        spikes = []; checkpoints = [];
        platforms = [{ x: 0, y: gCanvas.height-100, w: 500, h: 100 }];
        let curX = 500;
        for(let i=0; i<30; i++) {
            let gap = 140 + Math.random()*80;
            let width = 150 + Math.random()*150;
            let y = (gCanvas.height-140) - (Math.random()*180);
            if(y < 120) y = 120;
            const plat = { x: curX+gap, y: y, w: width, h: 35 };
            platforms.push(plat);
            if(i % 5 === 0 && i !== 0) checkpoints.push({ x: plat.x + plat.w/2, y: plat.y - 40, active: false });
            else if(Math.random() < 0.5 && i > 1) spikes.push({ x: plat.x + (plat.w/2) - 12, y: plat.y - 20, w: 24, h: 20 });
            curX += gap + width;
        }
        goal = { x: curX + 150, y: gCanvas.height-100 };
        player.x = lastCheck.x; player.y = lastCheck.y;
    }

    function loop() {
        if(state !== 'PLAYING') return;
        checkpointRotation += 0.05;
        if(keys.left) player.dx = -player.speed; else if(keys.right) player.dx = player.speed; else player.dx *= 0.8;
        player.dy += player.gravity; player.x += player.dx; player.y += player.dy;
        player.trail.push({x: player.x, y: player.y}); if(player.trail.length > 8) player.trail.shift();
        player.grounded = false;
        platforms.forEach(p => {
            if(player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y + player.h < p.y + p.h + 10) {
                if(player.dy > 0) { player.y = p.y - player.h; player.dy = 0; player.grounded = true; player.canDJ = true; }
            }
        });
        checkpoints.forEach(c => {
            if(!c.active && Math.hypot(player.x + 14 - c.x, player.y + 14 - c.y) < 35) { c.active = true; lastCheck = { x: c.x - 14, y: c.y - 14 }; sfx(900, 0.2); }
        });
        spikes.forEach(s => { if(player.x < s.x + s.w - 4 && player.x + player.w > s.x + 4 && player.y < s.y + s.h && player.y + player.h > s.y + 4) handleHit(); });
        if(player.y > gCanvas.height + 100) handleHit();
        if(player.x > goal.x) triggerQuiz();
        cameraX += ((player.x - gCanvas.width/3) - cameraX) * 0.1;
        if(cameraX < 0) cameraX = 0;
        render();
        loopID = requestAnimationFrame(loop);
    }

    function render() {
        gctx.clearRect(0,0, gCanvas.width, gCanvas.height);
        gctx.save(); gctx.translate(-cameraX, 0);
        platforms.forEach(p => { gctx.fillStyle = '#161b22'; gctx.fillRect(p.x, p.y, p.w, p.h); });
        checkpoints.forEach(c => {
            gctx.save(); gctx.translate(c.x, c.y); gctx.rotate(checkpointRotation);
            gctx.strokeStyle = c.active ? '#00ff88' : '#444'; gctx.lineWidth = 2;
            gctx.beginPath(); gctx.moveTo(0, -15); gctx.lineTo(12, 8); gctx.lineTo(-12, 8); gctx.closePath(); gctx.stroke();
            gctx.restore();
        });
        spikes.forEach(s => { gctx.fillStyle = '#ff4d4d'; gctx.beginPath(); gctx.moveTo(s.x, s.y+s.h); gctx.lineTo(s.x+s.w/2, s.y); gctx.lineTo(s.x+s.w, s.y+s.h); gctx.fill(); });
        gctx.fillStyle = '#00f2ff'; gctx.fillRect(goal.x, goal.y-100, 4, 100);
        player.trail.forEach((t, i) => { gctx.globalAlpha = i/12; gctx.fillStyle = '#00f2ff'; gctx.fillRect(t.x, t.y, player.w, player.h); });
        gctx.globalAlpha = 1; gctx.fillStyle = '#00f2ff'; gctx.fillRect(player.x, player.y, player.w, player.h);
        gctx.fillStyle = '#000'; gctx.fillRect(player.lastFace === 1 ? player.x + 16 : player.x + 4, player.y + 6, 8, 8);
        gctx.restore();
    }

    function handleHit() {
        sfx(80, 0.2, 'sawtooth'); lives--; updateHUD();
        if(lives <= 0) { lives = 3; lastCheck = { x: 100, y: gCanvas.height-200 }; generateLevel(); updateHUD(); }
        else { player.x = lastCheck.x; player.y = lastCheck.y; player.dx = player.dy = 0; }
    }

    function startGame() {
        requestFS();
        cancelAnimationFrame(loopID);
        AU.resume();
        username = document.getElementById('username').value.trim() || "REHAN";
        lives = 3; sector = 1; lastCheck = { x: 100, y: gCanvas.height-200 };
        showScreen(null); document.getElementById('hud').style.display = 'flex';
        state = 'PLAYING'; generateLevel(); updateHUD(); loop();
    }

    function triggerQuiz() {
        cancelAnimationFrame(loopID);
        state = 'QUIZ'; showScreen('quiz-screen');
        const q = questions[Math.floor(Math.random()*questions.length)];
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('opt-box'); box.innerHTML = '';
        q.o.forEach((opt, i) => {
            const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = opt;
            b.onclick = () => {
                if(i === q.a) { 
                    sfx(1200, 0.2); sector++; 
                    if(sector > best) { best = sector; localStorage.setItem('bs_best', best); } 
                    showScreen(null); state = 'PLAYING'; generateLevel(); updateHUD(); loop();
                } else { sfx(50, 0.4, 'sawtooth'); startGame(); }
            };
            box.appendChild(b);
        });
    }

    function updateHUD() { document.getElementById('hud-user').innerText = username; document.getElementById('hud-level').innerText = sector; document.getElementById('hud-lives').innerText = lives; }
    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); if(id) document.getElementById(id).classList.add('active'); document.getElementById('ui-layer').style.pointerEvents = id ? 'auto' : 'none'; }
    function toggleQR(s) { document.getElementById('qr-modal').classList.toggle('active', s); }
</script>
</body>
</html>
