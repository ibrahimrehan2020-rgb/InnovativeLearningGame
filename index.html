    "Psychographic" segmentation includes: | Nations/Cities | Lifestyle/Personality | Age/Gender | Usage/Loyalty | B
    "Behavioral" segmentation includes: | Religion | User status/Loyalty | Social class | Climate | B
    Mass marketing focuses on what is ______ in the needs of consumers. | Different | Common | Unique | Secret | B
    Tide being positioned as a "powerful, all-purpose detergent" is: | Targeting | Positioning | Segmentation | Distribution | B
    Comparing Ooredoo vs. Omantel is an example of: | Head-to-head positioning | Niche positioning | Differentiation positioning | Local positioning | A
    The simulation game mentioned in the slides is about: | Car sales | Ice cream segmentation | Mobile phones | Airline seats | B
    `;

    // SYSTEM ENGINES
    let masterQuestions = [], sessionPool = [];
    const keyMap = { 'A': 0, 'B': 1, 'C': 2, 'D': 3 };

    function initQuestions() {
        const lines = rawData.trim().split('\n');
        masterQuestions = lines.map(line => {
            const parts = line.split('|').map(p => p.trim());
            if (parts.length < 6) return null;
            return { q: parts[0], o: [parts[1], parts[2], parts[3], parts[4]], a: keyMap[parts[5]] };
        }).filter(q => q !== null);
        refreshPool();
    }

    function refreshPool() { sessionPool = [...masterQuestions].sort(() => Math.random() - 0.5); }

    const AU = new (window.AudioContext || window.webkitAudioContext)();
    function sfx(f, t, type='square', v=0.04) {
        try {
            const osc = AU.createOscillator(); const gain = AU.createGain();
            osc.type = type; osc.frequency.setValueAtTime(f, AU.currentTime);
            gain.gain.setValueAtTime(v, AU.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, AU.currentTime + t);
            osc.connect(gain); gain.connect(AU.destination); osc.start(); osc.stop(AU.currentTime + t);
        } catch(e){}
    }

    const gCanvas = document.getElementById('gameCanvas');
    const bCanvas = document.getElementById('bgCanvas');
    const gctx = gCanvas.getContext('2d');
    const bctx = bCanvas.getContext('2d');

    let state = 'MENU', lives = 3, sector = 1, cameraX = 0, username = "", chpRot = 0;
    let loopID, best = localStorage.getItem('bs_best') || 1;
    
    const player = { x: 100, y: 0, w: 30, h: 30, dx: 0, dy: 0, speed: 7, gravity: 0.65, jPower: -12.5, grounded: false, canDJ: true, trail: [] };
    let platforms = [], spikes = [], checkpoints = [], goal = { x: 0 }, lastCheck = { x: 100, y: 0 };
    const keys = { left: false, right: false };

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    function resize() { gCanvas.width = bCanvas.width = window.innerWidth; gCanvas.height = bCanvas.height = window.innerHeight; drawStars(); }
    window.onresize = resize; resize();

    function jump() {
        if(player.grounded) { player.dy = player.jPower; player.grounded = false; player.canDJ = true; sfx(400, 0.1); }
        else if(player.canDJ) { player.dy = player.jPower * 0.85; player.canDJ = false; sfx(600, 0.1); }
    }

    const mb = (id, k) => { 
        const el = document.getElementById(id); 
        el.addEventListener('touchstart', e => { e.preventDefault(); if(k==='up') jump(); else keys[k]=true; }, {passive: false});
        el.addEventListener('touchend', e => { e.preventDefault(); if(k!=='up') keys[k]=false; }, {passive: false});
    };
    mb('btn-left', 'left'); mb('btn-right', 'right'); mb('btn-up', 'up');

    function drawStars() {
        bctx.fillStyle = '#000'; bctx.fillRect(0,0,bCanvas.width, bCanvas.height);
        for(let i=0; i<150; i++) {
            bctx.fillStyle = `rgba(255,255,255,${Math.random()})`;
            bctx.beginPath(); bctx.arc(Math.random()*bCanvas.width, Math.random()*bCanvas.height, 1, 0, Math.PI*2); bctx.fill();
        }
    }

    function generateLevel() {
        spikes = []; checkpoints = [];
        platforms = [{ x: 0, y: gCanvas.height-100, w: 500, h: 100 }];
        let curX = 500;
        for(let i=0; i<30; i++) {
            let gap = 140 + Math.random()*100;
            let width = 150 + Math.random()*180;
            let y = (gCanvas.height-140) - (Math.random()*220);
            if(y < 150) y = 150;
            const p = { x: curX+gap, y: y, w: width, h: 35 };
            platforms.push(p);
            if(i % 6 === 0 && i !== 0) checkpoints.push({ x: p.x + width/2, y: p.y - 40, active: false });
            else if(Math.random() < 0.5 && i > 1) spikes.push({ x: p.x + width/2 - 12, y: p.y - 20, w: 24, h: 20 });
            curX += gap + width;
        }
        goal = { x: curX + 150 };
        player.x = lastCheck.x; player.y = lastCheck.y - 50;
    }

    function loop() {
        if(state !== 'PLAYING') return;
        chpRot += 0.05;
        if(keys.left) player.dx = -player.speed; else if(keys.right) player.dx = player.speed; else player.dx *= 0.8;
        player.dy += player.gravity; player.x += player.dx; player.y += player.dy;
        
        player.trail.push({x: player.x, y: player.y}); if(player.trail.length > 8) player.trail.shift();
        
        player.grounded = false;
        platforms.forEach(p => {
            if(player.x < p.x + p.w && player.x + player.w > p.x && player.y + player.h > p.y && player.y + player.h < p.y + p.h + 10) {
                if(player.dy > 0) { player.y = p.y - player.h; player.dy = 0; player.grounded = true; player.canDJ = true; }
            }
        });
        checkpoints.forEach(c => {
            if(!c.active && Math.hypot(player.x + 15 - c.x, player.y + 15 - c.y) < 40) {
                c.active = true; lastCheck = { x: c.x, y: c.y }; sfx(800, 0.2, 'sine');
            }
        });
        spikes.forEach(s => { if(player.x < s.x + s.w - 5 && player.x + player.w > s.x + 5 && player.y < s.y + s.h && player.y + player.h > s.y + 5) handleHit(); });
        if(player.y > gCanvas.height + 100) handleHit();
        if(player.x > goal.x) triggerQuiz();
        
        cameraX += ((player.x - gCanvas.width/3) - cameraX) * 0.1;
        if(cameraX < 0) cameraX = 0;
        render();
        loopID = requestAnimationFrame(loop);
    }

    function render() {
        gctx.clearRect(0,0, gCanvas.width, gCanvas.height);
        gctx.save(); gctx.translate(-cameraX, 0);
        gctx.fillStyle = '#161b22'; platforms.forEach(p => gctx.fillRect(p.x, p.y, p.w, p.h));
        
        checkpoints.forEach(c => {
            gctx.save(); gctx.translate(c.x, c.y); gctx.rotate(chpRot);
            gctx.strokeStyle = c.active ? '#00ff88' : '#444'; gctx.lineWidth = 2;
            gctx.beginPath(); gctx.moveTo(0, -15); gctx.lineTo(12, 10); gctx.lineTo(-12, 10); gctx.closePath(); gctx.stroke();
            gctx.restore();
        });

        gctx.fillStyle = '#ff4d4d'; spikes.forEach(s => { gctx.beginPath(); gctx.moveTo(s.x, s.y+s.h); gctx.lineTo(s.x+s.w/2, s.y); gctx.lineTo(s.x+s.w, s.y+s.h); gctx.fill(); });
        gctx.fillStyle = '#00f2ff'; gctx.fillRect(goal.x, 0, 4, gCanvas.height);
        
        player.trail.forEach((t, i) => { gctx.globalAlpha = i/10; gctx.fillRect(t.x, t.y, player.w, player.h); });
        gctx.globalAlpha = 1; gctx.shadowBlur = 10; gctx.shadowColor = '#00f2ff';
        gctx.fillRect(player.x, player.y, player.w, player.h);
        gctx.restore();
    }

    function handleHit() {
        sfx(80, 0.2, 'sawtooth'); lives--; updateHUD();
        if(lives <= 0) { lastCheck = { x: 100, y: gCanvas.height-200 }; startGame(); }
        else { player.x = lastCheck.x; player.y = lastCheck.y - 50; player.dx = player.dy = 0; }
    }

    function startGame() {
        if(sessionPool.length < 5) refreshPool();
        cancelAnimationFrame(loopID);
        AU.resume();
        username = document.getElementById('username').value || "REHAN";
        lives = 3; sector = 1; 
        showScreen(null); document.getElementById('hud').style.display = 'flex';
        state = 'PLAYING'; generateLevel(); updateHUD(); loop();
    }

    function triggerQuiz() {
        cancelAnimationFrame(loopID);
        state = 'QUIZ'; showScreen('quiz-screen');
        const q = sessionPool.pop();
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('opt-box'); box.innerHTML = '';
        q.o.forEach((opt, i) => {
            const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = opt;
            b.onclick = () => {
                if(i === q.a) { 
                    sfx(1200, 0.2); sector++; 
                    if(sector > best) { best = sector; localStorage.setItem('bs_best', best); }
                    showScreen(null); state = 'PLAYING'; generateLevel(); updateHUD(); loop();
                } else { sfx(50, 0.4, 'sawtooth'); startGame(); }
            };
            box.appendChild(b);
        });
    }

    function updateHUD() { 
        document.getElementById('hud-user').innerText = username; 
        document.getElementById('hud-level').innerText = sector; 
        document.getElementById('hud-lives').innerText = lives; 
    }
    
    function showScreen(id) { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
        if(id) document.getElementById(id).classList.add('active'); 
        document.getElementById('ui-layer').style.pointerEvents = id ? 'auto' : 'none'; 
    }

    function toggleQR(s) { document.getElementById('qr-modal').classList.toggle('active', s); }

    initQuestions();
    document.getElementById('hs-text').innerText = `BEST RECORD: SECTOR ${best}`;
</script>
</body>
</html>
